<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇 Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f23;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .app {
            display: flex;
            align-items: stretch;
            gap: 20px;
        }

        /* ============================================================
           左侧面板
        ============================================================ */
        .side-panel {
            width: 180px;
            background: #12122a;
            border: 2px solid #2a2a4a;
            border-radius: 10px;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            color: #ccc;
            font-size: 13px;
        }

        .panel-section {
            border-bottom: 1px solid #2a2a4a;
            padding-bottom: 14px;
        }
        .panel-section:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .panel-title {
            color: #e94560;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* 速度滑块 */
        .speed-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, #00d2ff, #e94560);
            outline: none;
            cursor: pointer;
        }
        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #e94560;
            cursor: pointer;
        }
        .speed-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #e94560;
            cursor: pointer;
        }

        .speed-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #555;
            margin-top: 2px;
        }

        .speed-current {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #00d2ff;
            margin-top: 4px;
        }

        /* 道具图鉴 — 精简版 */
        .item-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
            font-size: 12px;
        }
        .item-emoji {
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }
        .item-name {
            color: #ddd;
            flex: 1;
        }
        .item-pts {
            font-weight: 700;
            font-size: 12px;
        }
        .item-pts.positive { color: #4ecdc4; }
        .item-pts.bonus   { color: #ffd700; }
        .item-pts.negative { color: #e94560; }

        /* 实时统计 */
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .stat-label {
            color: #888;
            font-size: 11px;
        }
        .stat-value {
            color: #fff;
            font-weight: 700;
            font-size: 14px;
        }
        .stat-value.combo {
            color: #ffd700;
        }
        .stat-value.combo-fire {
            color: #ff6b6b;
            animation: pulse 0.3s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        /* 按钮 */
        .btn-row {
            display: flex;
            gap: 8px;
        }
        .btn {
            flex: 1;
            padding: 8px 0;
            border-radius: 6px;
            border: 1px solid #2a2a4a;
            background: #1a1a3a;
            color: #ccc;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.2s;
            text-align: center;
        }
        .btn:hover {
            background: #252550;
            border-color: #e94560;
        }
        .btn.active {
            background: #2a1a30;
            border-color: #e94560;
            color: #e94560;
        }
        .btn.muted-btn {
            flex: 0 0 auto;
            width: 38px;
            padding: 8px 0;
            font-size: 16px;
        }

        /* ============================================================
           游戏区
        ============================================================ */
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .score-bar {
            color: #ffffff;
            font-size: 17px;
            font-weight: 700;
            background: #16213e;
            padding: 10px 32px;
            border-radius: 8px;
            border: 2px solid #e94560;
            text-align: center;
        }

        .score-bar .high {
            color: #ffd700;
        }

        canvas {
            border-radius: 4px;
            display: block;
        }

        .controls-hint {
            color: #8888aa;
            font-size: 12px;
            text-align: center;
            line-height: 1.6;
        }

        .controls-hint span {
            color: #e94560;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- ============================================================
             左侧面板
        ============================================================ -->
        <div class="side-panel">
            <!-- 速度控制 -->
            <div class="panel-section">
                <div class="panel-title">⚡ Speed</div>
                <input type="range" class="speed-slider" id="speedSlider"
                       min="0.5" max="2.5" step="0.1" value="1.0">
                <div class="speed-labels">
                    <span>0.5x</span><span>1.5x</span><span>2.5x</span>
                </div>
                <div class="speed-current" id="speedDisplay">1.0x</div>
            </div>

            <!-- 道具图鉴 — 精简 -->
            <div class="panel-section">
                <div class="panel-title">🎁 Items</div>
                <div class="item-row">
                    <span class="item-emoji">🍎</span>
                    <span class="item-name">Apple</span>
                    <span class="item-pts positive">+10</span>
                </div>
                <div class="item-row">
                    <span class="item-emoji">⭐</span>
                    <span class="item-name">Golden</span>
                    <span class="item-pts bonus">+30</span>
                </div>
                <div class="item-row">
                    <span class="item-emoji">🍒</span>
                    <span class="item-name">Cherry</span>
                    <span class="item-pts bonus">+50</span>
                </div>
                <div class="item-row">
                    <span class="item-emoji">💀</span>
                    <span class="item-name">Poison</span>
                    <span class="item-pts negative">−5</span>
                </div>
            </div>

            <!-- 实时统计 -->
            <div class="panel-section">
                <div class="panel-title">📊 Stats</div>
                <div class="stat-row">
                    <span class="stat-label">Combo</span>
                    <span class="stat-value combo" id="comboDisplay">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Best Combo</span>
                    <span class="stat-value" id="bestComboDisplay">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Speed</span>
                    <span class="stat-value" id="speedStat">1.0x</span>
                </div>
            </div>

            <!-- 按钮 -->
            <div class="btn-row">
                <button class="btn" id="btnPause" title="Pause / Resume">⏯ Pause</button>
                <button class="btn muted-btn" id="btnMute" title="Toggle Music">🔊</button>
            </div>
        </div>

        <!-- ============================================================
             游戏主区
        ============================================================ -->
        <div class="game-wrapper">
            <div class="score-bar">
                Score: <span id="score">0</span>&nbsp;&nbsp;&nbsp;
                🏆 High Score: <span class="high" id="highScore">0</span>
            </div>
            <canvas id="gameCanvas"></canvas>
            <div class="controls-hint">
                <span>↑↓←→</span> / <span>WASD</span> move &nbsp;|&nbsp;
                <span>Space</span> restart &nbsp;|&nbsp;
                <span>M</span> music &nbsp;|&nbsp;
                <span>P</span> pause
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 配置
        // ============================================================
        const CANVAS_SIZE = 600;
        const GRID_SIZE = 20;
        const COLS = CANVAS_SIZE / GRID_SIZE;
        const ROWS = CANVAS_SIZE / GRID_SIZE;
        const BASE_SPEED = 120;
        const MIN_SPEED = 40;
        const SPEED_STEP = 2;
        const COMBO_WINDOW = 2000;
        const COMBO_BONUS = 5;

        // 特殊食物刷新间隔（毫秒）
        const SPECIAL_SPAWN_MIN = 8000;
        const SPECIAL_SPAWN_MAX = 15000;

        // 颜色方案
        const BG_COLOR = "#1a1a2e";
        const BORDER_COLOR = "#e94560";
        const SNAKE_HEAD_COLOR = "#00d2ff";
        const SNAKE_TAIL_COLOR = "#023e8a";   // 尾部最深色，与头部之间平滑插值
        const GAME_OVER_SNAKE_COLOR = "#e94560";
        const CANVAS_FONT = "700 40px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
        const CANVAS_FONT_MED = "700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
        const CANVAS_FONT_SM = "14px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
        const CANVAS_FONT_PAUSE = "700 36px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";

        // 特殊食物类型（不含普通苹果，普通苹果独立管理）
        const SPECIAL_TYPES = [
            { type: 'golden', color: '#ffd700', points: 30, chance: 0.60, name: 'Golden', emoji: '⭐', timer: 7000,  glow: '#ffd700', shape: 'star' },
            { type: 'cherry', color: '#ff69b4', points: 50, chance: 0.25, name: 'Cherry', emoji: '🍒', timer: 5000,  glow: '#ff69b4', shape: 'heart' },
            { type: 'poison', color: '#9b59b6', points: -5,  chance: 0.15, name: 'Poison', emoji: '💀', timer: 6000,  glow: '#9b59b6', shape: 'diamond', minScore: 30 },
        ];

        // ============================================================
        // 颜色工具 — 蛇身平滑渐变
        // ============================================================
        function hexToRgb(hex) {
            return {
                r: parseInt(hex.slice(1, 3), 16),
                g: parseInt(hex.slice(3, 5), 16),
                b: parseInt(hex.slice(5, 7), 16),
            };
        }

        function lerpColor(c1, c2, t) {
            const a = hexToRgb(c1);
            const b = hexToRgb(c2);
            const r = Math.round(a.r + (b.r - a.r) * t);
            const g = Math.round(a.g + (b.g - a.g) * t);
            const bv = Math.round(a.b + (b.b - a.b) * t);
            return `rgb(${r}, ${g}, ${bv})`;
        }

        // ============================================================
        // DOM 元素
        // ============================================================
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const highScoreEl = document.getElementById("highScore");
        const speedSlider = document.getElementById("speedSlider");
        const speedDisplay = document.getElementById("speedDisplay");
        const speedStat = document.getElementById("speedStat");
        const comboDisplay = document.getElementById("comboDisplay");
        const bestComboDisplay = document.getElementById("bestComboDisplay");
        const btnMute = document.getElementById("btnMute");
        const btnPause = document.getElementById("btnPause");

        canvas.width = CANVAS_SIZE;
        canvas.height = CANVAS_SIZE;

        // ============================================================
        // 游戏状态
        // ============================================================
        let snake = [];

        // 食物双轨制
        let normalFood = { x: 0, y: 0 };         // 🍎 常驻红苹果
        let specialFood = null;                   // { x, y, type } 或 null
        let specialFoodSpawnTime = 0;             // performance.now() 生成时刻
        let nextSpecialSpawnAt = 0;               // 下次生成时间戳

        let direction = "stop";
        let nextDirection = "stop";
        let score = 0;
        let highScore = 0;
        let internalSpeed = BASE_SPEED;
        let speedMultiplier = 1.0;
        let running = true;
        let paused = false;

        // Combo
        let comboCount = 0;
        let bestCombo = 0;
        let lastEatTime = 0;

        // 粒子 & 浮动文字
        let particles = [];
        let floatingTexts = [];

        // requestAnimationFrame
        let lastTime = 0;
        let accumulator = 0;
        let animFrameId = null;

        // ============================================================
        // 音频引擎 — 8-bit Chiptune（不变）
        // ============================================================
        const Audio = {
            ctx: null, masterGain: null, musicGain: null, sfxGain: null,
            muted: false, musicStarted: false, musicTimer: null,
            musicNoteIdx: 0, musicNextTime: 0, bassNoteIdx: 0, bassNextTime: 0,
            stepDuration: 0.14,

            noteToFreq(note) {
                const map = {
                    'C2': 65.41, 'D2': 73.42, 'E2': 82.41, 'F2': 87.31,
                    'G2': 98.00, 'A2': 110.00, 'B2': 123.47,
                    'C3': 130.81, 'D3': 146.83, 'E3': 164.81, 'F3': 174.61,
                    'G3': 196.00, 'A3': 220.00, 'B3': 246.94,
                    'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23,
                    'G4': 392.00, 'A4': 440.00, 'B4': 493.88,
                    'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'F5': 698.46,
                    'G5': 783.99, 'A5': 880.00, 'B5': 987.77,
                    'C6': 1046.50,
                };
                return map[note] || 0;
            },

            melody: [
                ['E5', 1], ['E5', 1], ['E5', 1], ['C5', 1], ['E5', 2], ['G5', 2],
                ['A5', 1], ['G5', 1], ['E5', 1], ['C5', 1], ['D5', 1], ['E5', 1], ['C5', 1], ['D5', 1],
                ['E5', 1], ['D5', 1], ['E5', 1], ['G5', 1], ['A5', 2], ['G5', 2],
                ['E5', 1], ['D5', 1], ['C5', 1], ['D5', 1], ['E5', 1], ['C5', 1], ['A4', 2],
                ['C5', 1], ['D5', 1], ['E5', 1], ['C5', 1], ['A4', 1], ['C5', 1], ['D5', 2],
                ['E5', 1], ['G5', 1], ['A5', 1], ['G5', 1], ['E5', 1], ['C5', 1], ['D5', 2],
                ['E5', 1], ['C5', 1], ['D5', 1], ['E5', 1], ['G5', 2], ['A5', 2],
                ['G5', 1], ['E5', 1], ['C5', 1], ['D5', 1], ['E5', 1], ['C5', 1], ['D5', 2],
            ],
            bassLine: [
                ['C3', 4], ['G3', 4], ['A3', 8],
                ['F3', 4], ['C3', 4], ['G3', 8],
                ['A3', 4], ['E3', 4], ['F3', 4], ['G3', 4],
                ['C3', 8], ['G3', 8],
            ],

            init() {
                if (this.ctx) return;
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.ctx.createGain();
                    this.masterGain.gain.value = 0.25;
                    this.masterGain.connect(this.ctx.destination);
                    this.musicGain = this.ctx.createGain();
                    this.musicGain.gain.value = 0.18;
                    this.musicGain.connect(this.masterGain);
                    this.sfxGain = this.ctx.createGain();
                    this.sfxGain.gain.value = 0.35;
                    this.sfxGain.connect(this.masterGain);
                } catch (e) { /* ignore */ }
            },

            playNote(freq, startTime, duration, type, gainNode) {
                if (!this.ctx || this.muted || freq <= 0) return;
                const osc = this.ctx.createOscillator();
                const env = this.ctx.createGain();
                osc.type = type || 'square';
                osc.frequency.value = freq;
                const vol = gainNode === this.sfxGain ? 0.35 : 0.18;
                env.gain.setValueAtTime(vol, startTime);
                env.gain.setValueAtTime(vol * 0.6, startTime + duration * 0.3);
                env.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                osc.connect(env);
                env.connect(gainNode || this.musicGain);
                osc.start(startTime);
                osc.stop(startTime + duration + 0.01);
            },

            scheduleAhead() {
                if (!this.ctx || this.muted) return;
                const lookAhead = 2.0;
                const now = this.ctx.currentTime;
                if (this.musicNextTime === 0) { this.musicNextTime = now + 0.1; this.bassNextTime = now + 0.1; }
                while (this.musicNextTime < now + lookAhead) {
                    const [note, steps] = this.melody[this.musicNoteIdx];
                    const dur = steps * this.stepDuration;
                    this.playNote(this.noteToFreq(note), this.musicNextTime, dur * 0.85, 'square', this.musicGain);
                    this.musicNextTime += dur;
                    this.musicNoteIdx = (this.musicNoteIdx + 1) % this.melody.length;
                }
                while (this.bassNextTime < now + lookAhead) {
                    const [note, steps] = this.bassLine[this.bassNoteIdx];
                    const dur = steps * this.stepDuration;
                    this.playNote(this.noteToFreq(note), this.bassNextTime, dur * 0.9, 'triangle', this.musicGain);
                    this.bassNextTime += dur;
                    this.bassNoteIdx = (this.bassNoteIdx + 1) % this.bassLine.length;
                }
            },

            startMusic() {
                if (this.musicStarted || this.muted) return;
                this.init();
                if (!this.ctx) return;
                this.musicStarted = true;
                this.musicNoteIdx = 0; this.bassNoteIdx = 0;
                this.musicNextTime = 0; this.bassNextTime = 0;
                this.scheduleAhead();
                this.musicTimer = setInterval(() => this.scheduleAhead(), 150);
            },

            stopMusic() {
                if (this.musicTimer) { clearInterval(this.musicTimer); this.musicTimer = null; }
                this.musicStarted = false;
                this.musicNextTime = 0; this.bassNextTime = 0;
            },

            playEat(points) {
                if (!this.ctx || this.muted) return;
                const now = this.ctx.currentTime;
                if (points > 0) {
                    const notes = points >= 40 ? ['C5', 'E5', 'G5', 'C6', 'E6']
                        : points >= 25 ? ['C5', 'E5', 'G5', 'C6'] : ['E5', 'G5', 'C6'];
                    notes.forEach((n, i) => this.playNote(this.noteToFreq(n), now + i * 0.04, 0.12, 'square', this.sfxGain));
                } else {
                    ['G4', 'Db4', 'G3'].forEach((n, i) =>
                        this.playNote(this.noteToFreq(n), now + i * 0.15, 0.25, 'sawtooth', this.sfxGain));
                }
            },

            playGameOver() {
                if (!this.ctx || this.muted) return;
                const now = this.ctx.currentTime;
                ['G5', 'E5', 'C5', 'G4', 'E4', 'C4'].forEach((n, i) =>
                    this.playNote(this.noteToFreq(n), now + i * 0.12, 0.2, 'square', this.sfxGain));
            },

            toggle() {
                this.init(); if (!this.ctx) return;
                this.muted = !this.muted;
                if (this.muted) { this.stopMusic(); btnMute.textContent = '🔇'; btnMute.classList.add('active'); }
                else { btnMute.textContent = '🔊'; btnMute.classList.remove('active'); this.startMusic(); }
            },
        };

        // ============================================================
        // 辅助
        // ============================================================
        function effectiveSpeed() {
            return Math.max(MIN_SPEED, internalSpeed / speedMultiplier);
        }

        function loadHighScore() {
            try { const v = localStorage.getItem("snake_high_score"); highScore = v ? parseInt(v, 10) : 0; }
            catch (e) { highScore = 0; }
        }
        function saveHighScore() {
            try { localStorage.setItem("snake_high_score", String(highScore)); } catch (e) { /* */ }
        }

        function randomInterval(min, max) {
            return min + Math.random() * (max - min);
        }

        // ============================================================
        // 食物系统 — 双轨制
        // ============================================================

        /** 计算包含蛇 + 普通食物 + 特殊食物（如果存在）的格子集合 */
        function getOccupiedCells() {
            const occupied = new Set(snake.map(seg => `${seg.x},${seg.y}`));
            occupied.add(`${normalFood.x},${normalFood.y}`);
            if (specialFood) occupied.add(`${specialFood.x},${specialFood.y}`);
            return occupied;
        }

        function getFreeCells(occupied) {
            const free = [];
            for (let col = 0; col < COLS; col++) {
                for (let row = 0; row < ROWS; row++) {
                    const key = `${col * GRID_SIZE},${row * GRID_SIZE}`;
                    if (!occupied.has(key)) free.push({ x: col * GRID_SIZE, y: row * GRID_SIZE });
                }
            }
            return free;
        }

        /** 生成普通红苹果：永远存在，吃掉立即刷新 */
        function spawnNormalFood() {
            const occupied = new Set(snake.map(seg => `${seg.x},${seg.y}`));
            if (specialFood) occupied.add(`${specialFood.x},${specialFood.y}`);
            const free = getFreeCells(occupied);
            if (free.length === 0) { gameOver(); return; }
            const pick = free[Math.floor(Math.random() * free.length)];
            normalFood.x = pick.x;
            normalFood.y = pick.y;
        }

        /** 选择特殊食物类型 */
        function pickSpecialType() {
            const roll = Math.random();
            let cumulative = 0;
            for (const st of SPECIAL_TYPES) {
                cumulative += st.chance;
                if (roll <= cumulative) {
                    if (st.minScore && score < st.minScore) continue;
                    return st;
                }
            }
            return SPECIAL_TYPES[0];
        }

        /** 生成特殊道具：不和蛇/红苹果重叠 */
        function spawnSpecialFood() {
            const occupied = new Set(snake.map(seg => `${seg.x},${seg.y}`));
            occupied.add(`${normalFood.x},${normalFood.y}`);
            const free = getFreeCells(occupied);
            if (free.length === 0) return; // 没有空位就不生成
            const pick = free[Math.floor(Math.random() * free.length)];
            const st = pickSpecialType();
            specialFood = { x: pick.x, y: pick.y, type: st };
            specialFoodSpawnTime = performance.now();
        }

        function specialFoodRemainingMs() {
            if (!specialFood) return Infinity;
            return Math.max(0, specialFood.type.timer - (performance.now() - specialFoodSpawnTime));
        }

        /** 安排下次特殊道具生成 */
        function scheduleNextSpecial() {
            nextSpecialSpawnAt = performance.now() + randomInterval(SPECIAL_SPAWN_MIN, SPECIAL_SPAWN_MAX);
        }

        // ============================================================
        // 粒子特效
        // ============================================================
        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const spd = 60 + Math.random() * 140;
                particles.push({
                    x: x + GRID_SIZE / 2,
                    y: y + GRID_SIZE / 2,
                    vx: Math.cos(angle) * spd,
                    vy: Math.sin(angle) * spd,
                    life: 0.35 + Math.random() * 0.4,
                    maxLife: 0.35 + Math.random() * 0.4,
                    color,
                    size: 2 + Math.random() * 4,
                });
            }
        }

        function spawnFloatingText(x, y, text, color) {
            floatingTexts.push({ x: x + GRID_SIZE / 2, y, text, life: 0.9, maxLife: 0.9, color });
        }

        // ============================================================
        // 初始化 / 重置
        // ============================================================
        function initGame() {
            const startX = Math.floor(COLS / 2) * GRID_SIZE;
            const startY = Math.floor(ROWS / 2) * GRID_SIZE;
            snake = [
                { x: startX, y: startY },
                { x: startX - GRID_SIZE, y: startY },
                { x: startX - GRID_SIZE * 2, y: startY },
            ];
            direction = "right";
            nextDirection = "right";
            score = 0;
            internalSpeed = BASE_SPEED;
            running = true;
            paused = false;
            btnPause.textContent = '⏯ Pause';
            accumulator = 0;
            lastTime = 0;
            comboCount = 0;
            bestCombo = 0;
            lastEatTime = 0;
            particles = [];
            floatingTexts = [];
            specialFood = null;
            scoreEl.textContent = "0";
            comboDisplay.textContent = "0";
            bestComboDisplay.textContent = "0";
            updateSpeedUI();
            spawnNormalFood();
            scheduleNextSpecial();
        }

        function updateSpeedUI() {
            speedDisplay.textContent = speedMultiplier.toFixed(1) + 'x';
            speedStat.textContent = speedMultiplier.toFixed(1) + 'x';
            speedSlider.value = speedMultiplier;
        }

        // ============================================================
        // 输入处理
        // ============================================================
        const opposites = { up: "down", down: "up", left: "right", right: "left" };

        function handleDirectionInput(newDir) {
            if (opposites[newDir] !== direction) nextDirection = newDir;
        }

        document.addEventListener("keydown", (e) => {
            if (!Audio.ctx) { Audio.init(); Audio.startMusic(); }
            if (e.code === "KeyM") { e.preventDefault(); Audio.toggle(); return; }
            if (e.code === "KeyP") { e.preventDefault(); togglePause(); return; }

            if (!running) {
                if (e.code === "Space") { e.preventDefault(); restart(); }
                return;
            }
            if (paused) return;

            switch (e.code) {
                case "ArrowUp":    case "KeyW": e.preventDefault(); handleDirectionInput("up");    break;
                case "ArrowDown":  case "KeyS": e.preventDefault(); handleDirectionInput("down");  break;
                case "ArrowLeft":  case "KeyA": e.preventDefault(); handleDirectionInput("left");  break;
                case "ArrowRight": case "KeyD": e.preventDefault(); handleDirectionInput("right"); break;
            }
        });

        function togglePause() {
            if (!running) return;
            paused = !paused;
            btnPause.textContent = paused ? '▶ Resume' : '⏯ Pause';
            if (!paused) {
                lastTime = 0; accumulator = 0;
                animFrameId = requestAnimationFrame(gameLoop);
                if (!Audio.muted) Audio.startMusic();
            } else {
                if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
                Audio.stopMusic();
            }
            draw();
        }

        btnMute.addEventListener("click", () => { Audio.init(); Audio.startMusic(); Audio.toggle(); });
        btnPause.addEventListener("click", togglePause);
        speedSlider.addEventListener("input", () => {
            speedMultiplier = parseFloat(speedSlider.value);
            updateSpeedUI();
        });

        // ============================================================
        // 游戏逻辑
        // ============================================================
        function processEat(foodX, foodY, foodTypeOrNull) {
            const now = performance.now();

            // Combo
            if (lastEatTime > 0 && (now - lastEatTime) < COMBO_WINDOW) {
                comboCount++;
            } else {
                comboCount = 1;
            }
            lastEatTime = now;
            if (comboCount > bestCombo) {
                bestCombo = comboCount;
                bestComboDisplay.textContent = bestCombo;
            }
            comboDisplay.textContent = comboCount;
            if (comboCount >= 3) {
                comboDisplay.classList.remove('combo-fire');
                void comboDisplay.offsetWidth;
                comboDisplay.classList.add('combo-fire');
            }

            const isSpecial = foodTypeOrNull !== null;
            const ft = isSpecial ? foodTypeOrNull : { type: 'normal', color: '#ff6b6b', points: 10, glow: '#ff6b6b' };
            const bonusPoints = (comboCount - 1) * COMBO_BONUS;
            const totalPoints = ft.points + bonusPoints;

            score += totalPoints;
            scoreEl.textContent = score;
            if (score > highScore) { highScore = score; highScoreEl.textContent = highScore; saveHighScore(); }
            internalSpeed = Math.max(MIN_SPEED, internalSpeed - SPEED_STEP);

            // 特效
            const particleCount = isSpecial ? (ft.points >= 40 ? 18 : 14) : 10;
            spawnParticles(foodX, foodY, ft.color, particleCount);
            let label = (totalPoints >= 0 ? '+' : '') + totalPoints;
            if (comboCount >= 3) label += ` COMBO x${comboCount}!`;
            spawnFloatingText(foodX, foodY, label, ft.color);
            Audio.playEat(ft.points);
        }

        function move() {
            direction = nextDirection;
            if (direction === "stop") return;

            const head = snake[0];
            let newX = head.x;
            let newY = head.y;

            switch (direction) {
                case "up":    newY -= GRID_SIZE; break;
                case "down":  newY += GRID_SIZE; break;
                case "left":  newX -= GRID_SIZE; break;
                case "right": newX += GRID_SIZE; break;
            }

            if (newX < 0 || newX >= CANVAS_SIZE || newY < 0 || newY >= CANVAS_SIZE) { gameOver(); return; }

            for (let i = 0; i < snake.length - 1; i++) {
                if (snake[i].x === newX && snake[i].y === newY) { gameOver(); return; }
            }

            snake.unshift({ x: newX, y: newY });

            // 检测吃到红苹果
            if (newX === normalFood.x && newY === normalFood.y) {
                processEat(normalFood.x, normalFood.y, null);
                spawnNormalFood(); // 立即刷新
            }
            // 检测吃到特殊道具
            else if (specialFood && newX === specialFood.x && newY === specialFood.y) {
                processEat(specialFood.x, specialFood.y, specialFood.type);
                specialFood = null;
                scheduleNextSpecial();
            }
            else {
                snake.pop();
            }
        }

        function gameOver() {
            running = false;
            direction = "stop";
            nextDirection = "stop";
            paused = false;
            btnPause.textContent = '⏯ Pause';
            Audio.stopMusic();
            Audio.playGameOver();
        }

        function restart() {
            if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
            initGame();
            Audio.stopMusic();
            if (!Audio.muted) Audio.startMusic();
            lastTime = 0; accumulator = 0;
            draw();
            animFrameId = requestAnimationFrame(gameLoop);
        }

        // ============================================================
        // 渲染
        // ============================================================
        function drawOneFood(fx, fy, ft, timerMs) {
            const cx = fx + GRID_SIZE / 2;
            const cy = fy + GRID_SIZE / 2;
            const r = GRID_SIZE / 2 - 2;

            ctx.shadowColor = ft.glow;
            ctx.shadowBlur = ft.type === 'golden' ? 14 : ft.type === 'cherry' ? 12 : ft.type === 'poison' ? 10 : 8;

            let alpha = 1;
            if (timerMs > 0 && timerMs < 2000) {
                alpha = 0.4 + 0.6 * Math.abs(Math.sin(performance.now() / 150));
            }

            ctx.globalAlpha = alpha;
            ctx.fillStyle = ft.color;

            switch (ft.shape) {
                case 'star':
                    drawStar(cx, cy, r * 0.6, r, 5);
                    break;
                case 'heart':
                    drawHeart(cx, cy, r);
                    break;
                case 'diamond':
                    drawDiamond(cx, cy, r);
                    break;
                default:
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fill();
            }

            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // 计时环
            if (timerMs > 0 && timerMs < Infinity) {
                const totalMs = timerMs;
                const remaining = Math.max(0, timerMs - (performance.now() - specialFoodSpawnTime));
                if (remaining < totalMs) {
                    ctx.strokeStyle = ft.color;
                    ctx.lineWidth = 2;
                    ctx.globalAlpha = 0.5;
                    ctx.beginPath();
                    ctx.arc(cx, cy, r + 4, -Math.PI / 2, -Math.PI / 2 - Math.PI * 2 * (remaining / totalMs), true);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }
        }

        function drawStar(cx, cy, innerR, outerR, points) {
            ctx.beginPath();
            for (let i = 0; i < points * 2; i++) {
                const r = i % 2 === 0 ? outerR : innerR;
                const angle = (i * Math.PI) / points - Math.PI / 2;
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
        }

        function drawHeart(cx, cy, size) {
            const s = size * 0.7;
            ctx.beginPath();
            ctx.moveTo(cx, cy + s);
            ctx.bezierCurveTo(cx - s, cy + s * 0.3, cx - s, cy - s * 0.6, cx, cy - s * 0.2);
            ctx.bezierCurveTo(cx + s, cy - s * 0.6, cx + s, cy + s * 0.3, cx, cy + s);
            ctx.fill();
        }

        function drawDiamond(cx, cy, r) {
            ctx.beginPath();
            ctx.moveTo(cx, cy - r);
            ctx.lineTo(cx + r * 0.7, cy);
            ctx.lineTo(cx, cy + r);
            ctx.lineTo(cx - r * 0.7, cy);
            ctx.closePath();
            ctx.fill();
        }

        function draw() {
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // 背景
            ctx.fillStyle = BG_COLOR;
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // Combo ≥5 边框发光
            if (comboCount >= 5 && running) {
                const intensity = 0.15 + 0.1 * Math.sin(performance.now() / 200);
                ctx.strokeStyle = `rgba(255, 215, 0, ${intensity})`;
                ctx.lineWidth = 8;
                ctx.strokeRect(4, 4, CANVAS_SIZE - 8, CANVAS_SIZE - 8);
            }

            // 边框
            ctx.strokeStyle = BORDER_COLOR;
            ctx.lineWidth = 4;
            ctx.strokeRect(2, 2, CANVAS_SIZE - 4, CANVAS_SIZE - 4);

            // 网格
            ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
            ctx.lineWidth = 0.5;
            for (let i = GRID_SIZE; i < CANVAS_SIZE; i += GRID_SIZE) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, CANVAS_SIZE); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(CANVAS_SIZE, i); ctx.stroke();
            }

            // 🍎 普通红苹果
            drawOneFood(normalFood.x, normalFood.y,
                { type: 'normal', color: '#ff6b6b', glow: '#ff6b6b', shape: 'circle' }, Infinity);

            // ⭐🍒💀 特殊道具
            if (specialFood) {
                const remaining = specialFood.type.timer - (performance.now() - specialFoodSpawnTime);
                drawOneFood(specialFood.x, specialFood.y, specialFood.type,
                    specialFood.type.timer > 0 ? specialFood.type.timer : Infinity);
            }

            // 蛇 — 颜色平滑渐变
            if (running || snake.length > 0) {
                const bodyLen = snake.length - 1; // 身体段数（不含头）
                for (let i = snake.length - 1; i >= 0; i--) {
                    const seg = snake[i];
                    let color;
                    if (!running) {
                        color = GAME_OVER_SNAKE_COLOR;
                    } else if (i === 0) {
                        color = SNAKE_HEAD_COLOR;
                    } else {
                        // 身体段从头部颜色平滑过渡到尾部深色
                        const t = bodyLen > 0 ? (i - 1) / Math.max(bodyLen, 1) : 0;
                        color = lerpColor(SNAKE_HEAD_COLOR, SNAKE_TAIL_COLOR, t);
                    }
                    ctx.fillStyle = color;
                    ctx.shadowColor = color;
                    ctx.shadowBlur = running ? 6 : 10;
                    const pad = 1;
                    ctx.fillRect(seg.x + pad, seg.y + pad, GRID_SIZE - pad * 2, GRID_SIZE - pad * 2);
                    ctx.shadowBlur = 0;
                }
            }

            // 粒子
            for (const p of particles) {
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
            }
            ctx.globalAlpha = 1;

            // 浮动文字
            for (const ft of floatingTexts) {
                const progress = 1 - ft.life / ft.maxLife;
                ctx.globalAlpha = ft.life / ft.maxLife;
                ctx.fillStyle = ft.color;
                ctx.font = "bold 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(ft.text, ft.x, ft.y - progress * 30);
                ctx.textAlign = "start";
            }
            ctx.globalAlpha = 1;

            // 暂停覆盖层
            if (paused && running) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
                ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
                ctx.fillStyle = "#ffffff";
                ctx.font = CANVAS_FONT_PAUSE;
                ctx.textAlign = "center";
                ctx.fillText("PAUSED", CANVAS_SIZE / 2, CANVAS_SIZE / 2);
                ctx.font = CANVAS_FONT_SM;
                ctx.fillStyle = "#cccccc";
                ctx.fillText("Press P to resume", CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 40);
                ctx.textAlign = "start";
            }

            // Game Over 覆盖层
            if (!running) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
                ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
                ctx.fillStyle = "#ffffff";
                ctx.font = CANVAS_FONT;
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", CANVAS_SIZE / 2, CANVAS_SIZE / 2 - 30);
                ctx.font = CANVAS_FONT_MED;
                ctx.fillText(`Final Score: ${score}`, CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 20);
                if (bestCombo > 1) {
                    ctx.font = "700 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
                    ctx.fillStyle = "#ffd700";
                    ctx.fillText(`Best Combo: x${bestCombo}`, CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 50);
                }
                ctx.font = CANVAS_FONT_SM;
                ctx.fillStyle = "#cccccc";
                ctx.fillText("Press SPACE to restart", CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 80);
                ctx.textAlign = "start";
            }
        }

        // ============================================================
        // 游戏循环
        // ============================================================
        function gameLoop(timestamp) {
            if (!running || paused) {
                if (!running) { draw(); animFrameId = null; }
                return;
            }

            if (lastTime === 0) lastTime = timestamp;
            const delta = Math.min(timestamp - lastTime, 500);
            lastTime = timestamp;
            accumulator += delta;

            const spd = effectiveSpeed();
            while (accumulator >= spd) {
                move();
                if (!running) { draw(); animFrameId = null; return; }
                accumulator -= spd;
            }

            // 特殊食物过期检查
            if (specialFood && specialFood.type.timer > 0 && specialFoodRemainingMs() <= 0) {
                specialFood = null;
                scheduleNextSpecial();
            }

            // 到时间生成特殊食物
            if (!specialFood && nextSpecialSpawnAt > 0 && timestamp >= nextSpecialSpawnAt) {
                spawnSpecialFood();
            }

            // 更新粒子
            const dtSec = delta / 1000;
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * dtSec;
                p.y += p.vy * dtSec;
                p.life -= dtSec;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // 更新浮动文字
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].life -= dtSec;
                if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
            }

            draw();
            animFrameId = requestAnimationFrame(gameLoop);
        }

        // ============================================================
        // 启动
        // ============================================================
        function start() {
            loadHighScore();
            highScoreEl.textContent = highScore;
            updateSpeedUI();
            initGame();
            draw();
            lastTime = 0; accumulator = 0;
            animFrameId = requestAnimationFrame(gameLoop);
        }

        start();
    </script>
</body>
