<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇 Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f23;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .score-bar {
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            background: #16213e;
            padding: 10px 32px;
            border-radius: 8px;
            border: 2px solid #e94560;
            text-align: center;
        }

        .score-bar .high {
            color: #ffd700;
        }

        canvas {
            border-radius: 4px;
            display: block;
        }

        .controls-hint {
            color: #8888aa;
            font-size: 13px;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.6;
        }

        .controls-hint span {
            color: #e94560;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="score-bar">
            Score: <span id="score">0</span>&nbsp;&nbsp;&nbsp;
            🏆 High Score: <span class="high" id="highScore">0</span>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls-hint">
            <span>↑↓←→</span> or <span>WASD</span> to move &nbsp;|&nbsp;
            <span>Space</span> to restart
        </div>
    </div>

    <script>
        // ============================================================
        // 配置
        // ============================================================
        const CANVAS_SIZE = 600;
        const GRID_SIZE = 20;
        const COLS = CANVAS_SIZE / GRID_SIZE;  // 30
        const ROWS = CANVAS_SIZE / GRID_SIZE;  // 30
        const INITIAL_SPEED = 120;   // 初始移动间隔（毫秒）
        const MIN_SPEED = 40;        // 最快速度
        const SPEED_STEP = 2;        // 每次吃食物加速量
        const SCORE_PER_FOOD = 10;

        // 颜色方案
        const BG_COLOR = "#1a1a2e";
        const BORDER_COLOR = "#e94560";
        const SNAKE_HEAD_COLOR = "#00d2ff";
        const SNAKE_BODY_COLORS = ["#00d2ff", "#00b4d8", "#0096c7", "#0077b6", "#023e8a"];
        const FOOD_COLOR = "#ff6b6b";
        const GAME_OVER_SNAKE_COLOR = "#e94560";

        // ============================================================
        // DOM 元素
        // ============================================================
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const highScoreEl = document.getElementById("highScore");

        canvas.width = CANVAS_SIZE;
        canvas.height = CANVAS_SIZE;

        // ============================================================
        // 游戏状态
        // ============================================================
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = "stop";
        let nextDirection = "stop";
        let score = 0;
        let highScore = 0;
        let speed = INITIAL_SPEED;
        let running = true;
        let gameLoopId = null;

        // ============================================================
        // 高分存取（localStorage）
        // ============================================================
        function loadHighScore() {
            try {
                const saved = localStorage.getItem("snake_high_score");
                highScore = saved ? parseInt(saved, 10) : 0;
            } catch (e) {
                highScore = 0;
            }
        }

        function saveHighScore() {
            try {
                localStorage.setItem("snake_high_score", String(highScore));
            } catch (e) {
                // localStorage 不可用时静默忽略
            }
        }

        // ============================================================
        // 初始化 / 重置
        // ============================================================
        function initGame() {
            // 蛇从中间开始，初始3节（头 + 2节身体），方向朝右
            const startX = Math.floor(COLS / 2) * GRID_SIZE;
            const startY = Math.floor(ROWS / 2) * GRID_SIZE;
            snake = [
                { x: startX, y: startY },
                { x: startX - GRID_SIZE, y: startY },
                { x: startX - GRID_SIZE * 2, y: startY },
            ];
            direction = "right";
            nextDirection = "right";
            score = 0;
            speed = INITIAL_SPEED;
            running = true;
            scoreEl.textContent = "0";
            spawnFood();
        }

        function spawnFood() {
            // 收集蛇占用的格子
            const occupied = new Set(snake.map(seg => `${seg.x},${seg.y}`));
            const freeCells = [];
            for (let col = 0; col < COLS; col++) {
                for (let row = 0; row < ROWS; row++) {
                    const key = `${col * GRID_SIZE},${row * GRID_SIZE}`;
                    if (!occupied.has(key)) {
                        freeCells.push({ x: col * GRID_SIZE, y: row * GRID_SIZE });
                    }
                }
            }
            if (freeCells.length === 0) {
                // 胜利！但实际上蛇占满格子才会出现
                gameOver(true);
                return;
            }
            const pick = freeCells[Math.floor(Math.random() * freeCells.length)];
            food.x = pick.x;
            food.y = pick.y;
        }

        // ============================================================
        // 输入处理
        // ============================================================
        document.addEventListener("keydown", (e) => {
            if (!running) {
                if (e.code === "Space") {
                    e.preventDefault();
                    restart();
                }
                return;
            }

            const opposites = {
                "up": "down", "down": "up",
                "left": "right", "right": "left",
            };

            let newDir = null;
            switch (e.code) {
                case "ArrowUp":    case "KeyW": newDir = "up";    break;
                case "ArrowDown":  case "KeyS": newDir = "down";  break;
                case "ArrowLeft":  case "KeyA": newDir = "left";  break;
                case "ArrowRight": case "KeyD": newDir = "right"; break;
                default: return;
            }

            e.preventDefault();
            // 不允许反向
            if (opposites[newDir] !== direction) {
                nextDirection = newDir;
            }
        });

        // ============================================================
        // 游戏逻辑
        // ============================================================
        function move() {
            direction = nextDirection;
            if (direction === "stop") return;

            const head = snake[0];
            let newX = head.x;
            let newY = head.y;

            switch (direction) {
                case "up":    newY -= GRID_SIZE; break;
                case "down":  newY += GRID_SIZE; break;
                case "left":  newX -= GRID_SIZE; break;
                case "right": newX += GRID_SIZE; break;
            }

            // 撞墙检测
            if (newX < 0 || newX >= CANVAS_SIZE || newY < 0 || newY >= CANVAS_SIZE) {
                gameOver(false);
                return;
            }

            // 撞自己检测（跳过尾巴，因为尾巴即将移走）
            for (let i = 0; i < snake.length - 1; i++) {
                if (snake[i].x === newX && snake[i].y === newY) {
                    gameOver(false);
                    return;
                }
            }

            // 插入新头部
            snake.unshift({ x: newX, y: newY });

            // 检查是否吃到食物
            if (newX === food.x && newY === food.y) {
                score += SCORE_PER_FOOD;
                scoreEl.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    saveHighScore();
                }
                // 加速
                speed = Math.max(MIN_SPEED, speed - SPEED_STEP);
                spawnFood();
                // 不吃食物时不移除尾巴 = 身体变长
            } else {
                snake.pop(); // 移除尾巴
            }
        }

        function gameOver(won) {
            running = false;
            direction = "stop";
            nextDirection = "stop";
            if (gameLoopId) {
                clearTimeout(gameLoopId);
                gameLoopId = null;
            }
            draw(); // 重绘以显示 game over 画面
        }

        function restart() {
            if (gameLoopId) {
                clearTimeout(gameLoopId);
                gameLoopId = null;
            }
            initGame();
            draw();
            scheduleLoop();
        }

        // ============================================================
        // 渲染
        // ============================================================
        function draw() {
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // 背景
            ctx.fillStyle = BG_COLOR;
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // 边框（4px 宽）
            ctx.strokeStyle = BORDER_COLOR;
            ctx.lineWidth = 4;
            ctx.strokeRect(2, 2, CANVAS_SIZE - 4, CANVAS_SIZE - 4);

            // 网格线（淡色，可选）
            ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
            ctx.lineWidth = 0.5;
            for (let i = GRID_SIZE; i < CANVAS_SIZE; i += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, CANVAS_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(CANVAS_SIZE, i);
                ctx.stroke();
            }

            // 食物
            ctx.fillStyle = FOOD_COLOR;
            ctx.shadowColor = FOOD_COLOR;
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(
                food.x + GRID_SIZE / 2,
                food.y + GRID_SIZE / 2,
                GRID_SIZE / 2 - 2,
                0, Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // 蛇身
            for (let i = snake.length - 1; i >= 0; i--) {
                const seg = snake[i];
                const color = running
                    ? (i === 0 ? SNAKE_HEAD_COLOR : SNAKE_BODY_COLORS[(i - 1) % SNAKE_BODY_COLORS.length])
                    : GAME_OVER_SNAKE_COLOR;

                ctx.fillStyle = color;
                ctx.shadowColor = running ? color : GAME_OVER_SNAKE_COLOR;
                ctx.shadowBlur = running ? 6 : 10;
                const pad = 1;
                ctx.fillRect(seg.x + pad, seg.y + pad, GRID_SIZE - pad * 2, GRID_SIZE - pad * 2);
                ctx.shadowBlur = 0;
            }

            // Game Over 覆盖层
            if (!running) {
                // 半透明遮罩
                ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
                ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

                // GAME OVER 文字
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 40px 'Courier New', monospace";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", CANVAS_SIZE / 2, CANVAS_SIZE / 2 - 30);

                // 最终分数
                ctx.font = "bold 22px 'Courier New', monospace";
                ctx.fillText(`Final Score: ${score}`, CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 20);

                // 提示
                ctx.font = "14px 'Courier New', monospace";
                ctx.fillStyle = "#cccccc";
                ctx.fillText(
                    "Press SPACE to restart",
                    CANVAS_SIZE / 2,
                    CANVAS_SIZE / 2 + 60
                );
                ctx.textAlign = "start";
            }
        }

        // ============================================================
        // 游戏循环
        // ============================================================
        function gameLoop() {
            if (!running) return;

            move();
            draw();
            gameLoopId = setTimeout(gameLoop, speed);
        }

        function scheduleLoop() {
            gameLoopId = setTimeout(gameLoop, speed);
        }

        // ============================================================
        // 启动
        // ============================================================
        function start() {
            loadHighScore();
            highScoreEl.textContent = highScore;
            initGame();
            draw();
            scheduleLoop();
        }

        start();
    </script>
</body>
</html>
