<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 贪吃蛇 Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f23;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .app {
            display: flex;
            align-items: stretch;
            gap: 20px;
        }

        /* ============================================================
           左侧面板
        ============================================================ */
        .side-panel {
            width: 180px;
            background: #12122a;
            border: 2px solid #2a2a4a;
            border-radius: 10px;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            color: #ccc;
            font-size: 13px;
        }

        .panel-section {
            border-bottom: 1px solid #2a2a4a;
            padding-bottom: 14px;
        }
        .panel-section:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .panel-title {
            color: #e94560;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* 速度滑块 */
        .speed-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, #00d2ff, #e94560);
            outline: none;
            cursor: pointer;
        }
        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #e94560;
            cursor: pointer;
        }
        .speed-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #e94560;
            cursor: pointer;
        }

        .speed-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #555;
            margin-top: 2px;
        }

        .speed-current {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #00d2ff;
            margin-top: 4px;
        }

        /* 道具图鉴 */
        .item-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
            font-size: 12px;
        }
        .item-emoji { width: 20px; text-align: center; flex-shrink: 0; }
        .item-name  { color: #ddd; flex: 1; }
        .item-pts   { font-weight: 700; font-size: 12px; }
        .item-pts.positive { color: #4ecdc4; }
        .item-pts.bonus   { color: #ffd700; }
        .item-pts.negative { color: #e94560; }

        /* 实时统计 */
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .stat-label { color: #888; font-size: 11px; }
        .stat-value { color: #fff; font-weight: 700; font-size: 14px; }
        .stat-value.combo { color: #ffd700; }
        .stat-value.combo-fire {
            color: #ff6b6b;
            animation: pulse 0.3s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        /* 按钮 */
        .btn-row {
            display: flex;
            gap: 8px;
        }
        .btn {
            flex: 1;
            padding: 8px 0;
            border-radius: 6px;
            border: 1px solid #2a2a4a;
            background: #1a1a3a;
            color: #ccc;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.2s;
            text-align: center;
        }
        .btn:hover {
            background: #252550;
            border-color: #e94560;
        }
        .btn.active {
            background: #2a1a30;
            border-color: #e94560;
            color: #e94560;
        }
        .btn.muted-btn {
            flex: 0 0 auto;
            width: 38px;
            padding: 8px 0;
            font-size: 16px;
        }

        /* ============================================================
           游戏区
        ============================================================ */
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .score-bar {
            color: #ffffff;
            font-size: 17px;
            font-weight: 700;
            background: #16213e;
            padding: 10px 28px;
            border-radius: 8px;
            border: 2px solid #e94560;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .score-bar .high { color: #ffd700; }

        .btn-reset-hs {
            background: none;
            border: 1px solid #444;
            color: #777;
            cursor: pointer;
            font-size: 15px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }
        .btn-reset-hs:hover {
            border-color: #e94560;
            color: #e94560;
            background: #2a1a30;
        }

        canvas {
            border-radius: 4px;
            display: block;
        }

        .controls-hint {
            color: #8888aa;
            font-size: 12px;
            text-align: center;
            line-height: 1.6;
        }
        .controls-hint span {
            color: #e94560;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- ============================================================
             左侧面板
        ============================================================ -->
        <div class="side-panel">
            <div class="panel-section">
                <div class="panel-title">⚡ Speed</div>
                <input type="range" class="speed-slider" id="speedSlider"
                       min="0.5" max="2.5" step="0.1" value="1.0">
                <div class="speed-labels">
                    <span>0.5x</span><span>1.5x</span><span>2.5x</span>
                </div>
                <div class="speed-current" id="speedDisplay">1.0x</div>
            </div>

            <div class="panel-section">
                <div class="panel-title">🎁 Items</div>
                <div class="item-row">
                    <span class="item-emoji">🍎</span><span class="item-name">Apple</span><span class="item-pts positive">+10</span>
                </div>
                <div class="item-row">
                    <span class="item-emoji">⭐</span><span class="item-name">Golden</span><span class="item-pts bonus">+30</span>
                </div>
                <div class="item-row">
                    <span class="item-emoji">🍒</span><span class="item-name">Cherry</span><span class="item-pts bonus">+50</span>
                </div>
                <div class="item-row">
                    <span class="item-emoji">💀</span><span class="item-name">Poison</span><span class="item-pts negative">−5</span>
                </div>
            </div>

            <div class="panel-section">
                <div class="panel-title">📊 Stats</div>
                <div class="stat-row">
                    <span class="stat-label">Combo</span>
                    <span class="stat-value combo" id="comboDisplay">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Best Combo</span>
                    <span class="stat-value" id="bestComboDisplay">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Speed</span>
                    <span class="stat-value" id="speedStat">1.0x</span>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn" id="btnPause" title="Pause / Resume">⏯ Pause</button>
                <button class="btn muted-btn" id="btnMute" title="Toggle Music">🔊</button>
            </div>
        </div>

        <!-- ============================================================
             游戏主区
        ============================================================ -->
        <div class="game-wrapper">
            <div class="score-bar">
                Score: <span id="score">0</span>&nbsp;&nbsp;&nbsp;
                🏆 High Score: <span class="high" id="highScore">0</span>
                <button class="btn-reset-hs" id="btnResetHS" title="Reset High Score">↻</button>
            </div>
            <canvas id="gameCanvas"></canvas>
            <div class="controls-hint">
                <span>↑↓←→</span> / <span>WASD</span> move &nbsp;|&nbsp;
                <span>Space</span> restart &nbsp;|&nbsp;
                <span>M</span> music &nbsp;|&nbsp;
                <span>P</span> pause
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 配置
        // ============================================================
        const CANVAS_SIZE = 600;
        const GRID_SIZE = 20;
        const COLS = CANVAS_SIZE / GRID_SIZE;
        const ROWS = CANVAS_SIZE / GRID_SIZE;
        const BASE_SPEED = 120;
        const MIN_SPEED = 40;
        const SPEED_STEP = 2;
        const COMBO_WINDOW = 2000;
        const COMBO_BONUS = 5;

        const SPECIAL_SPAWN_MIN = 8000;
        const SPECIAL_SPAWN_MAX = 15000;
        const CELEBRATION_DURATION = 2800; // 庆祝动画持续时间（ms）

        const BG_COLOR = "#1a1a2e";
        const BORDER_COLOR = "#e94560";
        const SNAKE_HEAD_COLOR = "#00d2ff";
        const SNAKE_TAIL_COLOR = "#023e8a";
        const GAME_OVER_SNAKE_COLOR = "#e94560";
        const CANVAS_FONT      = "700 40px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
        const CANVAS_FONT_MED  = "700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
        const CANVAS_FONT_SM   = "14px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
        const CANVAS_FONT_PAUSE = "700 36px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";

        const SPECIAL_TYPES = [
            { type:'golden', color:'#ffd700', points:30, chance:0.60, name:'Golden', emoji:'⭐', timer:7000,  glow:'#ffd700', shape:'star' },
            { type:'cherry', color:'#ff69b4', points:50, chance:0.25, name:'Cherry', emoji:'🍒', timer:5000,  glow:'#ff69b4', shape:'heart' },
            { type:'poison', color:'#9b59b6', points:-5,  chance:0.15, name:'Poison', emoji:'💀', timer:6000,  glow:'#9b59b6', shape:'diamond', minScore:30 },
        ];

        const CONFETTI_COLORS = ['#ff6b6b','#ffd700','#00d2ff','#ff69b4','#4ecdc4','#ffe66d','#a29bfe','#fd79a8','#ff9770','#7bed9f'];

        // ============================================================
        // 颜色工具
        // ============================================================
        function hexToRgb(hex) {
            return { r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16) };
        }
        function lerpColor(c1, c2, t) {
            const a=hexToRgb(c1), b=hexToRgb(c2);
            return `rgb(${Math.round(a.r+(b.r-a.r)*t)},${Math.round(a.g+(b.g-a.g)*t)},${Math.round(a.b+(b.b-a.b)*t)})`;
        }

        // ============================================================
        // DOM
        // ============================================================
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const highScoreEl = document.getElementById("highScore");
        const speedSlider = document.getElementById("speedSlider");
        const speedDisplay = document.getElementById("speedDisplay");
        const speedStat = document.getElementById("speedStat");
        const comboDisplay = document.getElementById("comboDisplay");
        const bestComboDisplay = document.getElementById("bestComboDisplay");
        const btnMute = document.getElementById("btnMute");
        const btnPause = document.getElementById("btnPause");
        const btnResetHS = document.getElementById("btnResetHS");

        canvas.width = CANVAS_SIZE;
        canvas.height = CANVAS_SIZE;

        // ============================================================
        // 游戏状态
        // ============================================================
        let snake = [];
        let normalFood = { x:0, y:0 };
        let specialFood = null;
        let specialFoodSpawnTime = 0;
        let nextSpecialSpawnAt = 0;

        let direction = "stop";
        let nextDirection = "stop";
        let score = 0;
        let highScore = 0;
        let internalSpeed = BASE_SPEED;
        let speedMultiplier = 1.0;
        let running = true;
        let paused = false;

        let comboCount = 0;
        let bestCombo = 0;
        let lastEatTime = 0;

        let particles = [];
        let floatingTexts = [];

        // 庆祝动画 — 只在结算时触发
        let beatHighScoreThisRound = false;
        let isNewHighScore = false;
        let celebrationStartTime = 0;
        let confetti = [];

        // RAF
        let lastTime = 0;
        let accumulator = 0;
        let animFrameId = null;

        // ============================================================
        // 音频引擎
        // ============================================================
        const Audio = {
            ctx:null, masterGain:null, musicGain:null, sfxGain:null,
            muted:false, musicStarted:false, musicTimer:null,
            musicNoteIdx:0, musicNextTime:0, bassNoteIdx:0, bassNextTime:0,
            stepDuration:0.14,

            noteToFreq(note) {
                const m={ 'C2':65.41,'D2':73.42,'E2':82.41,'F2':87.31,'G2':98.00,'A2':110.00,'B2':123.47,
                    'C3':130.81,'D3':146.83,'E3':164.81,'F3':174.61,'G3':196.00,'A3':220.00,'B3':246.94,
                    'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392.00,'A4':440.00,'B4':493.88,
                    'C5':523.25,'D5':587.33,'E5':659.25,'F5':698.46,'G5':783.99,'A5':880.00,'B5':987.77,
                    'C6':1046.50 };
                return m[note]||0;
            },

            melody: [
                ['E5',1],['E5',1],['E5',1],['C5',1],['E5',2],['G5',2],
                ['A5',1],['G5',1],['E5',1],['C5',1],['D5',1],['E5',1],['C5',1],['D5',1],
                ['E5',1],['D5',1],['E5',1],['G5',1],['A5',2],['G5',2],
                ['E5',1],['D5',1],['C5',1],['D5',1],['E5',1],['C5',1],['A4',2],
                ['C5',1],['D5',1],['E5',1],['C5',1],['A4',1],['C5',1],['D5',2],
                ['E5',1],['G5',1],['A5',1],['G5',1],['E5',1],['C5',1],['D5',2],
                ['E5',1],['C5',1],['D5',1],['E5',1],['G5',2],['A5',2],
                ['G5',1],['E5',1],['C5',1],['D5',1],['E5',1],['C5',1],['D5',2],
            ],
            bassLine: [
                ['C3',4],['G3',4],['A3',8],['F3',4],['C3',4],['G3',8],
                ['A3',4],['E3',4],['F3',4],['G3',4],['C3',8],['G3',8],
            ],

            init() {
                if(this.ctx)return;
                try{
                    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
                    this.masterGain=this.ctx.createGain(); this.masterGain.gain.value=0.25; this.masterGain.connect(this.ctx.destination);
                    this.musicGain=this.ctx.createGain(); this.musicGain.gain.value=0.18; this.musicGain.connect(this.masterGain);
                    this.sfxGain=this.ctx.createGain(); this.sfxGain.gain.value=0.35; this.sfxGain.connect(this.masterGain);
                }catch(e){}
            },

            playNote(freq,startTime,duration,type,gainNode){
                if(!this.ctx||this.muted||freq<=0)return;
                const o=this.ctx.createOscillator(), e=this.ctx.createGain();
                o.type=type||'square'; o.frequency.value=freq;
                const v=gainNode===this.sfxGain?0.35:0.18;
                e.gain.setValueAtTime(v,startTime);
                e.gain.setValueAtTime(v*0.6,startTime+duration*0.3);
                e.gain.exponentialRampToValueAtTime(0.001,startTime+duration);
                o.connect(e); e.connect(gainNode||this.musicGain);
                o.start(startTime); o.stop(startTime+duration+0.01);
            },

            scheduleAhead(){
                if(!this.ctx||this.muted)return;
                const look=2.0, now=this.ctx.currentTime;
                if(this.musicNextTime===0){this.musicNextTime=now+0.1;this.bassNextTime=now+0.1;}
                while(this.musicNextTime<now+look){
                    const[n,s]=this.melody[this.musicNoteIdx], d=s*this.stepDuration;
                    this.playNote(this.noteToFreq(n),this.musicNextTime,d*0.85,'square',this.musicGain);
                    this.musicNextTime+=d; this.musicNoteIdx=(this.musicNoteIdx+1)%this.melody.length;
                }
                while(this.bassNextTime<now+look){
                    const[n,s]=this.bassLine[this.bassNoteIdx], d=s*this.stepDuration;
                    this.playNote(this.noteToFreq(n),this.bassNextTime,d*0.9,'triangle',this.musicGain);
                    this.bassNextTime+=d; this.bassNoteIdx=(this.bassNoteIdx+1)%this.bassLine.length;
                }
            },

            startMusic(){
                if(this.musicStarted||this.muted)return; this.init(); if(!this.ctx)return;
                this.musicStarted=true; this.musicNoteIdx=0;this.bassNoteIdx=0; this.musicNextTime=0;this.bassNextTime=0;
                this.scheduleAhead(); this.musicTimer=setInterval(()=>this.scheduleAhead(),150);
            },
            stopMusic(){
                if(this.musicTimer){clearInterval(this.musicTimer);this.musicTimer=null;}
                this.musicStarted=false; this.musicNextTime=0;this.bassNextTime=0;
            },

            playEat(points){
                if(!this.ctx||this.muted)return;
                const now=this.ctx.currentTime;
                if(points>0){
                    const notes=points>=40?['C5','E5','G5','C6','E6']:points>=25?['C5','E5','G5','C6']:['E5','G5','C6'];
                    notes.forEach((n,i)=>this.playNote(this.noteToFreq(n),now+i*0.04,0.12,'square',this.sfxGain));
                }else{
                    ['G4','Db4','G3'].forEach((n,i)=>this.playNote(this.noteToFreq(n),now+i*0.15,0.25,'sawtooth',this.sfxGain));
                }
            },

            playGameOver(){
                if(!this.ctx||this.muted)return;
                const now=this.ctx.currentTime;
                ['G5','E5','C5','G4','E4','C4'].forEach((n,i)=>this.playNote(this.noteToFreq(n),now+i*0.12,0.2,'square',this.sfxGain));
            },

            // 🏆 新高分庆祝音效 — 上行大和弦琶音
            playNewHighScore(){
                if(!this.ctx||this.muted)return;
                const now=this.ctx.currentTime;
                ['C5','E5','G5','C6','E6','G6'].forEach((n,i)=>this.playNote(this.noteToFreq(n),now+i*0.08,0.18,'square',this.sfxGain));
            },

            toggle(){
                this.init();if(!this.ctx)return;
                this.muted=!this.muted;
                if(this.muted){this.stopMusic();btnMute.textContent='🔇';btnMute.classList.add('active');}
                else{btnMute.textContent='🔊';btnMute.classList.remove('active');this.startMusic();}
            },

            // 立即切断所有正在播放的音效（用于重开时消除上一局的残留音效）
            killAllSFX(){
                if(!this.ctx)return;
                const now=this.ctx.currentTime;
                this.sfxGain.gain.cancelScheduledValues(now);
                this.sfxGain.gain.setValueAtTime(0,now);
                this.sfxGain.gain.setValueAtTime(0.35,now+0.03);
            },
        };

        // ============================================================
        // 辅助
        // ============================================================
        function effectiveSpeed(){ return Math.max(MIN_SPEED, internalSpeed/speedMultiplier); }
        function loadHighScore(){
            try{const v=localStorage.getItem("snake_high_score"); highScore=v?parseInt(v,10):0;}catch(e){highScore=0;}
        }
        function saveHighScore(){
            try{localStorage.setItem("snake_high_score",String(highScore));}catch(e){}
        }
        function resetHighScore(){
            highScore=0;
            highScoreEl.textContent="0";
            try{localStorage.removeItem("snake_high_score");}catch(e){}
        }
        function randomInterval(min,max){ return min+Math.random()*(max-min); }

        // ============================================================
        // 食物系统
        // ============================================================
        function getOccupiedCells(){
            const o=new Set(snake.map(s=>`${s.x},${s.y}`));
            o.add(`${normalFood.x},${normalFood.y}`);
            if(specialFood) o.add(`${specialFood.x},${specialFood.y}`);
            return o;
        }
        function getFreeCells(occupied){
            const f=[];
            for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++){
                const k=`${c*GRID_SIZE},${r*GRID_SIZE}`;
                if(!occupied.has(k)) f.push({x:c*GRID_SIZE,y:r*GRID_SIZE});
            }
            return f;
        }
        function spawnNormalFood(){
            const o=new Set(snake.map(s=>`${s.x},${s.y}`));
            if(specialFood) o.add(`${specialFood.x},${specialFood.y}`);
            const f=getFreeCells(o);
            if(f.length===0){gameOver();return;}
            const p=f[Math.floor(Math.random()*f.length)];
            normalFood.x=p.x; normalFood.y=p.y;
        }
        function pickSpecialType(){
            const roll=Math.random(); let cum=0;
            for(const st of SPECIAL_TYPES){
                cum+=st.chance;
                if(roll<=cum){ if(st.minScore&&score<st.minScore)continue; return st; }
            }
            return SPECIAL_TYPES[0];
        }
        function spawnSpecialFood(){
            const o=new Set(snake.map(s=>`${s.x},${s.y}`));
            o.add(`${normalFood.x},${normalFood.y}`);
            const f=getFreeCells(o);
            if(f.length===0)return;
            const p=f[Math.floor(Math.random()*f.length)];
            specialFood={x:p.x,y:p.y,type:pickSpecialType()};
            specialFoodSpawnTime=performance.now();
        }
        function specialFoodRemainingMs(){
            if(!specialFood)return Infinity;
            return Math.max(0,specialFood.type.timer-(performance.now()-specialFoodSpawnTime));
        }
        function scheduleNextSpecial(){
            nextSpecialSpawnAt=performance.now()+randomInterval(SPECIAL_SPAWN_MIN,SPECIAL_SPAWN_MAX);
        }

        // ============================================================
        // 特效
        // ============================================================
        function spawnParticles(x,y,color,count){
            for(let i=0;i<count;i++){
                const a=Math.random()*Math.PI*2, s=60+Math.random()*140;
                particles.push({x:x+GRID_SIZE/2,y:y+GRID_SIZE/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
                    life:0.35+Math.random()*0.4,maxLife:0.35+Math.random()*0.4,color,size:2+Math.random()*4});
            }
        }
        function spawnFloatingText(x,y,text,color){
            floatingTexts.push({x:x+GRID_SIZE/2,y,text,life:0.9,maxLife:0.9,color});
        }

        // 🎉 礼花弹
        function spawnConfetti(){
            for(let i=0;i<100;i++){
                const x=Math.random()*CANVAS_SIZE;
                const y=-30-Math.random()*120;
                const vx=(Math.random()-0.5)*300;
                const vy=80+Math.random()*250;
                const life=2+Math.random()*2.5;
                confetti.push({
                    x,y,vx,vy,life,maxLife:life,
                    color:CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)],
                    w:4+Math.random()*7, h:2+Math.random()*4,
                    rotation:Math.random()*Math.PI*2,
                    rotSpeed:(Math.random()-0.5)*12,
                });
            }
        }

        function triggerNewHighScore(){
            isNewHighScore=true;
            celebrationStartTime=performance.now();
            spawnConfetti();
            Audio.playNewHighScore();
        }

        // ============================================================
        // 初始化
        // ============================================================
        function initGame(){
            const sx=Math.floor(COLS/2)*GRID_SIZE, sy=Math.floor(ROWS/2)*GRID_SIZE;
            snake=[{x:sx,y:sy},{x:sx-GRID_SIZE,y:sy},{x:sx-GRID_SIZE*2,y:sy}];
            direction="right"; nextDirection="right";
            score=0; internalSpeed=BASE_SPEED; running=true; paused=false;
            btnPause.textContent='⏯ Pause';
            accumulator=0; lastTime=0;
            comboCount=0; bestCombo=0; lastEatTime=0;
            particles=[]; floatingTexts=[]; confetti=[];
            specialFood=null;
            beatHighScoreThisRound=false; isNewHighScore=false;
            scoreEl.textContent="0";
            comboDisplay.textContent="0"; bestComboDisplay.textContent="0";
            updateSpeedUI();
            spawnNormalFood();
            scheduleNextSpecial();
        }
        function updateSpeedUI(){
            speedDisplay.textContent=speedMultiplier.toFixed(1)+'x';
            speedStat.textContent=speedMultiplier.toFixed(1)+'x';
            speedSlider.value=speedMultiplier;
        }

        // ============================================================
        // 输入
        // ============================================================
        const opposites={up:"down",down:"up",left:"right",right:"left"};
        function handleDirectionInput(newDir){ if(opposites[newDir]!==direction) nextDirection=newDir; }

        document.addEventListener("keydown",(e)=>{
            if(!Audio.ctx){Audio.init();Audio.startMusic();}
            if(e.code==="KeyM"){e.preventDefault();Audio.toggle();return;}
            if(e.code==="KeyP"){e.preventDefault();togglePause();return;}
            if(!running){if(e.code==="Space"){e.preventDefault();restart();}return;}
            if(paused)return;
            switch(e.code){
                case"ArrowUp":case"KeyW":e.preventDefault();handleDirectionInput("up");break;
                case"ArrowDown":case"KeyS":e.preventDefault();handleDirectionInput("down");break;
                case"ArrowLeft":case"KeyA":e.preventDefault();handleDirectionInput("left");break;
                case"ArrowRight":case"KeyD":e.preventDefault();handleDirectionInput("right");break;
            }
        });

        function togglePause(){
            if(!running)return;
            paused=!paused; btnPause.textContent=paused?'▶ Resume':'⏯ Pause';
            if(!paused){
                lastTime=0;accumulator=0; animFrameId=requestAnimationFrame(gameLoop);
                if(!Audio.muted)Audio.startMusic();
            }else{
                if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;} Audio.stopMusic();
            }
            draw();
        }

        btnMute.addEventListener("click",()=>{Audio.init();Audio.startMusic();Audio.toggle();});
        btnPause.addEventListener("click",togglePause);
        speedSlider.addEventListener("input",()=>{speedMultiplier=parseFloat(speedSlider.value);updateSpeedUI();});
        btnResetHS.addEventListener("click",()=>{resetHighScore();});

        // ============================================================
        // 游戏逻辑
        // ============================================================
        function processEat(foodX,foodY,foodTypeOrNull){
            const now=performance.now();
            if(lastEatTime>0&&(now-lastEatTime)<COMBO_WINDOW){comboCount++;}else{comboCount=1;}
            lastEatTime=now;
            if(comboCount>bestCombo){bestCombo=comboCount;bestComboDisplay.textContent=bestCombo;}
            comboDisplay.textContent=comboCount;
            if(comboCount>=3){comboDisplay.classList.remove('combo-fire');void comboDisplay.offsetWidth;comboDisplay.classList.add('combo-fire');}

            const isSpecial=foodTypeOrNull!==null;
            const ft=isSpecial?foodTypeOrNull:{type:'normal',color:'#ff6b6b',points:10,glow:'#ff6b6b'};
            const bonus=(comboCount-1)*COMBO_BONUS;
            const total=ft.points+bonus;

            score+=total; scoreEl.textContent=score;

            // 🏆 高于历史最高分 → 静默更新，结算时再庆祝
            if(score>highScore){
                highScore=score; highScoreEl.textContent=highScore; saveHighScore();
                beatHighScoreThisRound=true;
            }

            internalSpeed=Math.max(MIN_SPEED,internalSpeed-SPEED_STEP);
            const pc=isSpecial?(ft.points>=40?18:14):10;
            spawnParticles(foodX,foodY,ft.color,pc);
            let label=(total>=0?'+':'')+total;
            if(comboCount>=3)label+=` COMBO x${comboCount}!`;
            spawnFloatingText(foodX,foodY,label,ft.color);
            Audio.playEat(ft.points);
        }

        function move(){
            direction=nextDirection; if(direction==="stop")return;
            const h=snake[0]; let nx=h.x, ny=h.y;
            switch(direction){case"up":ny-=GRID_SIZE;break;case"down":ny+=GRID_SIZE;break;case"left":nx-=GRID_SIZE;break;case"right":nx+=GRID_SIZE;break;}
            if(nx<0||nx>=CANVAS_SIZE||ny<0||ny>=CANVAS_SIZE){gameOver();return;}
            for(let i=0;i<snake.length-1;i++){if(snake[i].x===nx&&snake[i].y===ny){gameOver();return;}}
            snake.unshift({x:nx,y:ny});

            if(nx===normalFood.x&&ny===normalFood.y){
                processEat(normalFood.x,normalFood.y,null);
                spawnNormalFood();
            }else if(specialFood&&nx===specialFood.x&&ny===specialFood.y){
                processEat(specialFood.x,specialFood.y,specialFood.type);
                specialFood=null; scheduleNextSpecial();
            }else{snake.pop();}
        }

        function gameOver(){
            running=false; direction="stop"; nextDirection="stop"; paused=false;
            btnPause.textContent='⏯ Pause'; Audio.stopMusic();
            if(beatHighScoreThisRound){
                triggerNewHighScore();
            }else{
                Audio.playGameOver();
            }
        }
        function restart(){
            if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
            Audio.killAllSFX();
            initGame(); Audio.stopMusic();
            if(!Audio.muted)Audio.startMusic();
            lastTime=0;accumulator=0; draw(); animFrameId=requestAnimationFrame(gameLoop);
        }

        // ============================================================
        // 渲染
        // ============================================================
        function drawOneFood(fx,fy,ft,timerMs,spawnTime){
            const cx=fx+GRID_SIZE/2, cy=fy+GRID_SIZE/2, r=GRID_SIZE/2-2;
            ctx.shadowColor=ft.glow;
            ctx.shadowBlur=ft.type==='golden'?14:ft.type==='cherry'?12:ft.type==='poison'?10:8;
            let alpha=1;
            if(timerMs>0&&timerMs<2000) alpha=0.4+0.6*Math.abs(Math.sin(performance.now()/150));
            ctx.globalAlpha=alpha; ctx.fillStyle=ft.color;
            switch(ft.shape){
                case'star':drawStar(cx,cy,r*0.6,r,5);break;
                case'heart':drawHeart(cx,cy,r);break;
                case'diamond':drawDiamond(cx,cy,r);break;
                default:ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
            }
            ctx.globalAlpha=1; ctx.shadowBlur=0;
            if(timerMs>0&&timerMs<Infinity&&spawnTime){
                const rem=Math.max(0,timerMs-(performance.now()-spawnTime));
                if(rem<timerMs){
                    ctx.strokeStyle=ft.color; ctx.lineWidth=2; ctx.globalAlpha=0.5;
                    ctx.beginPath(); ctx.arc(cx,cy,r+4,-Math.PI/2,-Math.PI/2-Math.PI*2*(rem/timerMs),true); ctx.stroke();
                    ctx.globalAlpha=1;
                }
            }
        }
        function drawStar(cx,cy,ir,or,pts){
            ctx.beginPath();
            for(let i=0;i<pts*2;i++){
                const r=i%2===0?or:ir, a=(i*Math.PI)/pts-Math.PI/2;
                const x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r;
                if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
            }
            ctx.closePath(); ctx.fill();
        }
        function drawHeart(cx,cy,size){
            const s=size*0.7; ctx.beginPath();
            ctx.moveTo(cx,cy+s);
            ctx.bezierCurveTo(cx-s,cy+s*0.3,cx-s,cy-s*0.6,cx,cy-s*0.2);
            ctx.bezierCurveTo(cx+s,cy-s*0.6,cx+s,cy+s*0.3,cx,cy+s);
            ctx.fill();
        }
        function drawDiamond(cx,cy,r){
            ctx.beginPath(); ctx.moveTo(cx,cy-r); ctx.lineTo(cx+r*0.7,cy);
            ctx.lineTo(cx,cy+r); ctx.lineTo(cx-r*0.7,cy); ctx.closePath(); ctx.fill();
        }

        function draw(){
            ctx.clearRect(0,0,CANVAS_SIZE,CANVAS_SIZE);
            ctx.fillStyle=BG_COLOR; ctx.fillRect(0,0,CANVAS_SIZE,CANVAS_SIZE);

            if(comboCount>=5&&running){
                const i=0.15+0.1*Math.sin(performance.now()/200);
                ctx.strokeStyle=`rgba(255,215,0,${i})`; ctx.lineWidth=8;
                ctx.strokeRect(4,4,CANVAS_SIZE-8,CANVAS_SIZE-8);
            }
            ctx.strokeStyle=BORDER_COLOR; ctx.lineWidth=4; ctx.strokeRect(2,2,CANVAS_SIZE-4,CANVAS_SIZE-4);

            ctx.strokeStyle="rgba(255,255,255,0.03)"; ctx.lineWidth=0.5;
            for(let i=GRID_SIZE;i<CANVAS_SIZE;i+=GRID_SIZE){
                ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,CANVAS_SIZE);ctx.stroke();
                ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(CANVAS_SIZE,i);ctx.stroke();
            }

            // 食物
            drawOneFood(normalFood.x,normalFood.y,{type:'normal',color:'#ff6b6b',glow:'#ff6b6b',shape:'circle'},Infinity);
            if(specialFood){
                drawOneFood(specialFood.x,specialFood.y,specialFood.type,specialFood.type.timer,specialFoodSpawnTime);
            }

            // 蛇
            if(running||snake.length>0){
                const bl=snake.length-1;
                for(let i=snake.length-1;i>=0;i--){
                    const seg=snake[i]; let color;
                    if(!running) color=GAME_OVER_SNAKE_COLOR;
                    else if(i===0) color=SNAKE_HEAD_COLOR;
                    else{ const t=bl>0?(i-1)/Math.max(bl,1):0; color=lerpColor(SNAKE_HEAD_COLOR,SNAKE_TAIL_COLOR,t); }
                    ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=running?6:10;
                    const pad=1; ctx.fillRect(seg.x+pad,seg.y+pad,GRID_SIZE-pad*2,GRID_SIZE-pad*2); ctx.shadowBlur=0;
                }
            }

            // 普通粒子
            for(const p of particles){
                ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=p.color;
                ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
            }
            ctx.globalAlpha=1;

            // 礼花 confetti
            for(const c of confetti){
                const progress=1-c.life/c.maxLife;
                ctx.save();
                ctx.globalAlpha=Math.min(1,c.life/(c.maxLife*0.4));
                ctx.translate(c.x,c.y); ctx.rotate(c.rotation);
                ctx.fillStyle=c.color;
                ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);
                ctx.restore();
            }
            ctx.globalAlpha=1;

            // 浮动文字
            for(const ft of floatingTexts){
                const pr=1-ft.life/ft.maxLife;
                ctx.globalAlpha=ft.life/ft.maxLife; ctx.fillStyle=ft.color;
                ctx.font="bold 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
                ctx.textAlign="center"; ctx.fillText(ft.text,ft.x,ft.y-pr*30); ctx.textAlign="start";
            }
            ctx.globalAlpha=1;

            // 🏆 NEW HIGH SCORE 庆祝覆盖层 — 结算时替换 GAME OVER
            if(isNewHighScore){
                const elapsed=performance.now()-celebrationStartTime;
                const progress=Math.min(1,elapsed/CELEBRATION_DURATION);

                // 变暗遮罩
                const dimAlpha=0.6*(progress<0.15?progress/0.15:1);
                ctx.fillStyle=`rgba(0,0,0,${dimAlpha})`; ctx.fillRect(0,0,CANVAS_SIZE,CANVAS_SIZE);

                // 弹入动画
                const scaleEase=progress<0.2?progress/0.2:1;
                const scaleVal=0.5+(1-Math.pow(1-scaleEase,3))*0.7;
                const bounce=Math.sin(progress*Math.PI*2.5)*Math.max(0,1-progress)*8;

                ctx.save();
                ctx.translate(CANVAS_SIZE/2,CANVAS_SIZE/2);
                ctx.scale(scaleVal,scaleVal);

                // 🏆 大奖杯
                ctx.font="72px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple Color Emoji', sans-serif";
                ctx.textAlign="center"; ctx.fillText("🏆",0,-48+bounce);

                // NEW HIGH SCORE — 字号对齐 GAME OVER
                ctx.font=CANVAS_FONT;
                ctx.fillStyle="#ffd700"; ctx.shadowColor="#ffd700"; ctx.shadowBlur=20;
                ctx.fillText("NEW HIGH SCORE!",0,12+bounce);
                ctx.shadowBlur=0;

                // 分数
                ctx.font=CANVAS_FONT_MED;
                ctx.fillStyle="#ffffff";
                ctx.fillText(String(score),0,52+bounce);

                // 最佳 combo
                if(bestCombo>1){
                    ctx.font="700 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
                    ctx.fillStyle="#ffd700";
                    ctx.fillText(`Best Combo: x${bestCombo}`,0,80+bounce);
                }

                ctx.restore();

                // 底部提示
                ctx.font=CANVAS_FONT_SM; ctx.fillStyle="#cccccc"; ctx.textAlign="center";
                ctx.fillText("Press SPACE to restart",CANVAS_SIZE/2,CANVAS_SIZE/2+120);
                ctx.textAlign="start";
            }

            // 暂停
            if(paused&&running){
                ctx.fillStyle="rgba(0,0,0,0.5)"; ctx.fillRect(0,0,CANVAS_SIZE,CANVAS_SIZE);
                ctx.fillStyle="#ffffff"; ctx.font=CANVAS_FONT_PAUSE; ctx.textAlign="center";
                ctx.fillText("PAUSED",CANVAS_SIZE/2,CANVAS_SIZE/2);
                ctx.font=CANVAS_FONT_SM; ctx.fillStyle="#cccccc";
                ctx.fillText("Press P to resume",CANVAS_SIZE/2,CANVAS_SIZE/2+40);
                ctx.textAlign="start";
            }

            // Game Over — 没刷新纪录时正常显示
            if(!running && !isNewHighScore){
                ctx.fillStyle="rgba(0,0,0,0.65)"; ctx.fillRect(0,0,CANVAS_SIZE,CANVAS_SIZE);
                ctx.fillStyle="#ffffff"; ctx.font=CANVAS_FONT; ctx.textAlign="center";
                ctx.fillText("GAME OVER",CANVAS_SIZE/2,CANVAS_SIZE/2-30);
                ctx.font=CANVAS_FONT_MED; ctx.fillText(`Final Score: ${score}`,CANVAS_SIZE/2,CANVAS_SIZE/2+20);
                if(bestCombo>1){
                    ctx.font="700 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
                    ctx.fillStyle="#ffd700"; ctx.fillText(`Best Combo: x${bestCombo}`,CANVAS_SIZE/2,CANVAS_SIZE/2+50);
                }
                ctx.font=CANVAS_FONT_SM; ctx.fillStyle="#cccccc";
                ctx.fillText("Press SPACE to restart",CANVAS_SIZE/2,CANVAS_SIZE/2+80);
                ctx.textAlign="start";
            }
        }

        // ============================================================
        // 游戏循环
        // ============================================================
        function gameLoop(timestamp){
            // 游戏结束但有庆祝动画 → 继续运行动画循环
            if(!running||paused){
                if(!running && isNewHighScore){
                    const delta=Math.min(timestamp-(lastTime||timestamp),500); lastTime=timestamp;
                    const dtSec=delta/1000;
                    for(let i=confetti.length-1;i>=0;i--){
                        const c=confetti[i]; c.x+=c.vx*dtSec; c.y+=c.vy*dtSec; c.vy+=180*dtSec;
                        c.rotation+=c.rotSpeed*dtSec; c.life-=dtSec;
                        if(c.life<=0) confetti.splice(i,1);
                    }
                    draw(); animFrameId=requestAnimationFrame(gameLoop); return;
                }
                if(!running){draw();animFrameId=null;} return;
            }

            if(lastTime===0)lastTime=timestamp;
            const delta=Math.min(timestamp-lastTime,500); lastTime=timestamp;
            accumulator+=delta;
            const spd=effectiveSpeed();
            while(accumulator>=spd){
                move(); if(!running && !isNewHighScore){draw();animFrameId=null;return;} accumulator-=spd;
            }

            if(specialFood&&specialFood.type.timer>0&&specialFoodRemainingMs()<=0){ specialFood=null;scheduleNextSpecial(); }
            if(!specialFood&&nextSpecialSpawnAt>0&&timestamp>=nextSpecialSpawnAt){ spawnSpecialFood(); }

            const dtSec=delta/1000;

            // 更新普通粒子
            for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dtSec;p.y+=p.vy*dtSec;p.life-=dtSec;if(p.life<=0)particles.splice(i,1);}
            // 更新礼花
            for(let i=confetti.length-1;i>=0;i--){
                const c=confetti[i];
                c.x+=c.vx*dtSec; c.y+=c.vy*dtSec; c.vy+=180*dtSec; // 重力
                c.rotation+=c.rotSpeed*dtSec; c.life-=dtSec;
                if(c.life<=0) confetti.splice(i,1);
            }
            // 更新浮动文字
            for(let i=floatingTexts.length-1;i>=0;i--){floatingTexts[i].life-=dtSec;if(floatingTexts[i].life<=0)floatingTexts.splice(i,1);}

            draw();
            animFrameId=requestAnimationFrame(gameLoop);
        }

        // ============================================================
        // 启动
        // ============================================================
        function start(){
            loadHighScore(); highScoreEl.textContent=highScore; updateSpeedUI(); initGame();
            draw(); lastTime=0;accumulator=0; animFrameId=requestAnimationFrame(gameLoop);
        }
        start();
    </script>
</body>
</html>
